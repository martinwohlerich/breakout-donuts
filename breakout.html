<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Breakout</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 0%, #1a2238 0%, #0a0e1a 60%, #050709 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #e6edf3;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap { text-align: center; width: 100%; max-width: 480px; padding: 0 10px; }
  canvas {
    background: #0c1018;
    border: 3px solid #2a3349;
    border-radius: 10px;
    box-shadow: 0 0 50px rgba(80,160,255,0.18), inset 0 0 60px rgba(0,0,0,0.5);
    display: block;
    width: 100%;
    height: auto;
    max-width: 480px;
    touch-action: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
    margin: 0 auto 10px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(80,160,255,0.5);
  }
  #hint {
    margin-top: 10px;
    font-size: 13px;
    color: #8b949e;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(3,5,10,0.78);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #overlay h1 {
    font-size: 46px;
    margin-bottom: 10px;
    text-shadow: 0 0 25px rgba(80,160,255,0.7);
    letter-spacing: 2px;
  }
  #overlay button {
    margin-top: 20px;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    background: linear-gradient(180deg, #4c95ff, #2f6fe0);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(47,111,224,0.5);
    transition: transform 0.1s ease;
  }
  #overlay button:hover { background: linear-gradient(180deg, #5fa3ff, #3f80f0); transform: translateY(-1px); }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Leben: <span id="lives">3</span></span>
    <span>Level: <span id="level">1</span></span>
    <span id="muteBtn" style="cursor:pointer;">🔊</span>
  </div>
  <canvas id="game" width="480" height="560"></canvas>
  <div id="hint">Maus/Finger bewegen oder ← → zum Steuern · Leertaste/Klick/Tippen: Start/Pause</div>
</div>

<div id="overlay">
  <h1 id="overlayTitle">Breakout</h1>
  <p id="overlayText">Leertaste oder Klick zum Starten</p>
  <button id="overlayBtn">Start</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayText = document.getElementById('overlayText');
const overlayBtn = document.getElementById('overlayBtn');

const PADDLE_W = 90, PADDLE_H = 14, PADDLE_Y = H - 30;
const BALL_R = 7;
const BRICK_ROWS = 5, BRICK_COLS = 8;
const BRICK_W = 44, BRICK_H = 44, BRICK_PAD = 8, BRICK_TOP = 45, BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
const GLAZE_COLORS = ['#ff6fa5', '#ff9f43', '#ffd76f', '#7ee787', '#6fb1ff'];
const SPRINKLE_COLORS = ['#ffffff', '#ff5e7a', '#5ec8ff', '#ffe34d', '#7ee787'];

let score = 0, lives = 3, level = 1;
let running = false, gameOver = false;
let bricks = [];

let paddle = { x: W / 2 - PADDLE_W / 2, w: PADDLE_W };
let ball = {};
let trail = [];
let particles = [];
let shake = 0;

// Sterne-Hintergrund (statisch generiert)
const stars = Array.from({ length: 60 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.5 + 0.2
}));

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      color: Math.random() < 0.4 ? color : SPRINKLE_COLORS[Math.floor(Math.random() * SPRINKLE_COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.4
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.dx;
    p.y += p.dy;
    p.dy += 0.08;
    p.life -= 0.035;
    p.rot += p.spin;
  }
  particles = particles.filter(p => p.life > 0);
}

// --- Sound ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.2, glideTo = null) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ac.currentTime + duration);
  gain.gain.setValueAtTime(volume, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start();
  osc.stop(ac.currentTime + duration);
}

let muted = false;
const sound = {
  wall: () => !muted && playTone(220, 0.06, 'triangle', 0.12),
  paddle: () => !muted && playTone(330, 0.08, 'square', 0.15, 440),
  brick: pitch => !muted && playTone(440 + pitch * 30, 0.1, 'square', 0.18, 660 + pitch * 30),
  life: () => !muted && playTone(180, 0.35, 'sawtooth', 0.2, 80),
  levelUp: () => {
    if (muted) return;
    playTone(440, 0.12, 'sine', 0.2, 660);
    setTimeout(() => playTone(660, 0.15, 'sine', 0.2, 880), 120);
  },
  gameOver: () => !muted && playTone(300, 0.6, 'sawtooth', 0.2, 60)
};

function resetBall(speedMult = 1) {
  ball = {
    x: W / 2,
    y: PADDLE_Y - BALL_R - 1,
    dx: 3 * speedMult * (Math.random() > 0.5 ? 1 : -1),
    dy: -3.5 * speedMult,
    r: BALL_R
  };
}

function buildBricks() {
  bricks = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const glaze = GLAZE_COLORS[r % GLAZE_COLORS.length];
      const sprinkles = Array.from({ length: 6 }, () => ({
        angle: Math.random() * Math.PI * 2,
        dist: Math.random() * (BRICK_W / 2 - 8) + 4,
        rot: Math.random() * Math.PI,
        color: SPRINKLE_COLORS[Math.floor(Math.random() * SPRINKLE_COLORS.length)]
      }));
      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        alive: true,
        glaze,
        sprinkles,
        points: (BRICK_ROWS - r) * 10
      });
    }
  }
}

function resetGame() {
  score = 0; lives = 3; level = 1;
  paddle.w = PADDLE_W;
  paddle.x = W / 2 - paddle.w / 2;
  buildBricks();
  resetBall(1 + (level - 1) * 0.15);
  updateHud();
}

function updateHud() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  levelEl.textContent = level;
}

function showOverlay(title, text, btnLabel) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  overlayBtn.textContent = btnLabel;
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

document.getElementById('muteBtn').addEventListener('click', e => {
  e.stopPropagation();
  muted = !muted;
  e.target.textContent = muted ? '🔇' : '🔊';
});

// Steuerung
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mouseX = (e.clientX - rect.left) * (W / rect.width);
  paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
});

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    toggleRun();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', toggleRun);
overlayBtn.addEventListener('click', toggleRun);

// Touch-Steuerung (Mobil)
function moveByClientX(clientX) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (W / rect.width);
  paddle.x = Math.max(0, Math.min(W - paddle.w, x - paddle.w / 2));
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  moveByClientX(e.touches[0].clientX);
  if (!running) toggleRun();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  moveByClientX(e.touches[0].clientX);
}, { passive: false });

overlayBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  toggleRun();
}, { passive: false });

function toggleRun() {
  if (gameOver) {
    resetGame();
    gameOver = false;
    running = true;
    hideOverlay();
    return;
  }
  running = !running;
  if (running) hideOverlay();
  else showOverlay('Pause', 'Leertaste oder Klick zum Weiterspielen', 'Weiter');
}

function movePaddle() {
  if (keys['ArrowLeft']) paddle.x -= 7;
  if (keys['ArrowRight']) paddle.x += 7;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}

function update() {
  movePaddle();

  ball.x += ball.dx;
  ball.y += ball.dy;

  trail.push({ x: ball.x, y: ball.y });
  if (trail.length > 10) trail.shift();

  updateParticles();
  if (shake > 0) shake *= 0.85;

  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; sound.wall(); }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx *= -1; sound.wall(); }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; sound.wall(); }

  // Paddle-Kollision
  if (ball.y + ball.r >= PADDLE_Y && ball.y + ball.r <= PADDLE_Y + PADDLE_H + 6 &&
      ball.x >= paddle.x && ball.x <= paddle.x + paddle.w && ball.dy > 0) {
    const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
    ball.dy = -Math.abs(ball.dy);
    ball.dx = hitPos * 5;
    ball.y = PADDLE_Y - ball.r;
    sound.paddle();
  }

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      score += b.points;
      spawnParticles(ball.x, ball.y, b.glaze, 12);
      sound.brick(b.points / 10);

      const overlapLeft = (ball.x + ball.r) - b.x;
      const overlapRight = (b.x + b.w) - (ball.x - ball.r);
      const overlapTop = (ball.y + ball.r) - b.y;
      const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
      const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
      if (minOverlap === overlapTop || minOverlap === overlapBottom) ball.dy *= -1;
      else ball.dx *= -1;

      updateHud();
      break;
    }
  }

  // Ball verloren
  if (ball.y - ball.r > H) {
    lives--;
    shake = 12;
    trail = [];
    updateHud();
    if (lives <= 0) {
      gameOver = true;
      running = false;
      sound.gameOver();
      showOverlay('Game Over', `Score: ${score}`, 'Neu starten');
    } else {
      sound.life();
      resetBall(1 + (level - 1) * 0.15);
    }
  }

  // Level geschafft
  if (bricks.every(b => !b.alive)) {
    level++;
    buildBricks();
    resetBall(1 + (level - 1) * 0.15);
    updateHud();
    sound.levelUp();
  }
}

function shadeColor(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + percent, g = ((num >> 8) & 0x00FF) + percent, b = (num & 0x0000FF) + percent;
  r = Math.max(Math.min(255, r), 0); g = Math.max(Math.min(255, g), 0); b = Math.max(Math.min(255, b), 0);
  return `rgb(${r},${g},${b})`;
}

function draw() {
  ctx.save();
  if (shake > 0.3) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  ctx.clearRect(-20, -20, W + 40, H + 40);

  // Sterne-Hintergrund
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,200,255,${s.a})`;
    ctx.fill();
  }

  // Bricks als 3D-Donuts (echte Kreise)
  for (const b of bricks) {
    if (!b.alive) continue;
    const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
    const rOuter = Math.min(b.w, b.h) / 2 - 1, rInner = rOuter * 0.4;

    ctx.save();
    ctx.translate(cx, cy);

    // Schlagschatten auf der Unterlage
    ctx.beginPath();
    ctx.arc(1.5, 2.5, rOuter, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();

    // Teig-Ring (3D-Gradient: hell oben, dunkel unten)
    ctx.beginPath();
    ctx.arc(0, 0, rOuter, 0, Math.PI * 2);
    const doughGrad = ctx.createLinearGradient(0, -rOuter, 0, rOuter);
    doughGrad.addColorStop(0, '#f3c98a');
    doughGrad.addColorStop(0.5, '#d89b56');
    doughGrad.addColorStop(1, '#a8703a');
    ctx.fillStyle = doughGrad;
    ctx.fill();

    // Glasur (etwas kleiner als Teig, oben drauf)
    ctx.beginPath();
    ctx.arc(0, -0.5, rOuter * 0.92, 0, Math.PI * 2);
    const glazeGrad = ctx.createRadialGradient(-rOuter * 0.3, -rOuter * 0.4, 1, 0, 0, rOuter);
    glazeGrad.addColorStop(0, shadeColor(b.glaze, 60));
    glazeGrad.addColorStop(0.6, b.glaze);
    glazeGrad.addColorStop(1, shadeColor(b.glaze, -30));
    ctx.fillStyle = glazeGrad;
    ctx.fill();

    // Glanzlicht
    ctx.beginPath();
    ctx.ellipse(-rOuter * 0.35, -rOuter * 0.45, rOuter * 0.32, rOuter * 0.14, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    // Loch in der Mitte (zeigt Hintergrund durch dunklen Kreis)
    ctx.beginPath();
    ctx.arc(0, 0, rInner, 0, Math.PI * 2);
    ctx.fillStyle = '#0c1018';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0.8, rInner * 0.85, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();

    // Streusel
    for (const s of b.sprinkles) {
      const sx = Math.cos(s.angle) * s.dist;
      const sy = Math.sin(s.angle) * s.dist;
      if (Math.hypot(sx, sy) > rOuter * 0.92 || Math.hypot(sx, sy) < rInner * 1.15) continue;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(s.rot);
      ctx.fillStyle = s.color;
      ctx.fillRect(-2.5, -0.8, 5, 1.6);
      ctx.restore();
    }

    ctx.restore();
  }

  // Partikel (Streusel-Splitter)
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-2.5, -0.8, 5, 1.6);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Paddle als Nudelholz (Rolling Pin)
  const handleW = 10, handleH = PADDLE_H * 0.6;
  const bodyX = paddle.x + handleW, bodyW = paddle.w - handleW * 2;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;

  // Holz-Walze (Zylinder-Look: helle Mitte, dunkle Raender oben/unten)
  const woodGrad = ctx.createLinearGradient(0, PADDLE_Y, 0, PADDLE_Y + PADDLE_H);
  woodGrad.addColorStop(0, '#8a5a2e');
  woodGrad.addColorStop(0.5, '#e8b576');
  woodGrad.addColorStop(1, '#8a5a2e');
  ctx.fillStyle = woodGrad;
  ctx.beginPath();
  ctx.roundRect(bodyX, PADDLE_Y, bodyW, PADDLE_H, PADDLE_H / 2);
  ctx.fill();
  ctx.restore();

  // Holzmaserung
  ctx.strokeStyle = 'rgba(120,70,30,0.35)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(bodyX + 6, PADDLE_Y + (PADDLE_H / 4) * i);
    ctx.lineTo(bodyX + bodyW - 6, PADDLE_Y + (PADDLE_H / 4) * i);
    ctx.stroke();
  }

  // Glanzstreifen (Zylinder-Highlight)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.roundRect(bodyX + 4, PADDLE_Y + 2, bodyW - 8, 2.5, 2);
  ctx.fill();

  // Griffe an beiden Enden (helles Holz, abgesetzt)
  const handleGrad = ctx.createLinearGradient(0, PADDLE_Y + (PADDLE_H - handleH) / 2, 0, PADDLE_Y + (PADDLE_H + handleH) / 2);
  handleGrad.addColorStop(0, '#f3d9ad');
  handleGrad.addColorStop(0.5, '#caa06a');
  handleGrad.addColorStop(1, '#f3d9ad');
  ctx.fillStyle = handleGrad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, PADDLE_Y + (PADDLE_H - handleH) / 2, handleW + 2, handleH, handleH / 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(paddle.x + paddle.w - handleW - 2, PADDLE_Y + (PADDLE_H - handleH) / 2, handleW + 2, handleH, handleH / 2);
  ctx.fill();

  // Ball-Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.4;
    const r = ball.r * (i / trail.length);
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(120,190,255,${alpha})`;
    ctx.fill();
  }

  // Ball mit Glow
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.9)';
  ctx.shadowBlur = 16;
  const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(1, '#9fd3ff');
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = ballGrad;
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function loop() {
  if (running) {
    update();
  }
  draw();
  requestAnimationFrame(loop);
}

resetGame();
showOverlay('Breakout', 'Leertaste oder Klick zum Starten', 'Start');
loop();
</script>
</body>
</html>
