<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Donut Breakout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 50% 0%, #2b1c2c 0%, #150d18 55%, #0a060c 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
    color: #f3ede6;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap { text-align: center; width: 100%; max-width: 480px; padding: 0 10px; }
  canvas {
    background: #120c16;
    border-radius: 14px;
    box-shadow: 0 0 0 1px rgba(255,170,110,0.18), 0 10px 40px rgba(0,0,0,0.55), 0 0 70px rgba(255,140,70,0.12), inset 0 0 80px rgba(0,0,0,0.45);
    display: block;
    width: 100%;
    height: auto;
    max-width: 480px;
    touch-action: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    margin: 0 auto 10px;
    padding: 8px 14px;
    box-sizing: border-box;
    font-family: 'Quicksand', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    background: linear-gradient(180deg, rgba(66,42,58,0.6), rgba(32,20,32,0.6));
    border: 1px solid rgba(255,170,110,0.2);
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(6px);
  }
  #hud .stat { display: flex; align-items: center; gap: 5px; }
  #hud .icon { font-size: 15px; filter: drop-shadow(0 0 4px rgba(255,150,70,0.6)); }
  #hud .val { color: #ffdcae; }
  #lives { color: #ff7f96; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255,110,140,0.6); }
  #muteBtn { cursor: pointer; }
  #hint {
    margin-top: 10px;
    font-size: 12px;
    color: #9d8ba0;
    letter-spacing: 0.2px;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 40%, rgba(60,30,25,0.4), rgba(8,5,10,0.92));
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }
  #overlay .panel {
    position: relative;
    max-width: 420px;
    padding: 34px 36px;
    background: linear-gradient(165deg, rgba(74,46,58,0.55), rgba(28,18,30,0.75));
    border: 1px solid rgba(255,170,110,0.25);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 50px rgba(255,130,60,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow: hidden;
  }
  #overlay .panel::before {
    content: '';
    position: absolute;
    top: -60%; left: 50%;
    width: 220px; height: 220px;
    margin-left: -110px;
    background: radial-gradient(circle, rgba(255,170,100,0.35), rgba(255,170,100,0) 70%);
    animation: panelGlow 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes panelGlow {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  #overlay h1, #overlay p, #overlay button { position: relative; }
  #overlay h1 {
    font-family: 'Quicksand', sans-serif;
    font-size: 36px;
    font-weight: 700;
    margin: 0 0 12px;
    color: #ffd3a1;
    text-shadow: 0 0 28px rgba(255,140,60,0.6);
    letter-spacing: 1px;
  }
  #overlay p { margin: 0; line-height: 1.6; color: #d9cbd4; font-size: 15px; }
  #overlay button {
    margin-top: 24px;
    padding: 13px 32px;
    font-family: 'Quicksand', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, #ffa25e, #f0742a);
    color: #2b1200;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(240,116,42,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  #overlay button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,116,42,0.55), inset 0 1px 0 rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="stat"><span class="icon">🍩</span><span class="val" id="score">0</span></span>
    <span class="stat"><span class="icon">🏆</span><span class="val" id="highscore">0</span></span>
    <span class="stat" id="lives">♥♥♥</span>
    <span class="stat">Lv&nbsp;<span class="val" id="level">1</span></span>
    <span class="stat" id="muteBtn">🔊</span>
  </div>
  <canvas id="game" width="480" height="560"></canvas>
  <div id="hint">Wischen/Maus/← → steuert · Tippen/Leertaste: Ball abschießen &amp; Pause</div>
</div>

<div id="overlay">
  <div class="panel">
    <h1 id="overlayTitle">Donut Breakout</h1>
    <p id="overlayText">Leertaste oder Klick zum Starten</p>
    <button id="overlayBtn">Start</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayText = document.getElementById('overlayText');
const overlayBtn = document.getElementById('overlayBtn');

const PADDLE_W = 90, PADDLE_H = 14, PADDLE_Y = H - 30;
const BALL_R = 7;
const BRICK_ROWS = 5, BRICK_COLS = 8;
const BRICK_W = 44, BRICK_H = 44, BRICK_PAD = 8, BRICK_TOP = 45, BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
const GLAZE_COLORS = ['#ff6fa5', '#ff9f43', '#ffd76f', '#7ee787', '#6fb1ff'];
const SPRINKLE_COLORS = ['#ffffff', '#ff5e7a', '#5ec8ff', '#ffe34d', '#7ee787'];

let score = 0, lives = 3, level = 1;
let highscore = parseInt(localStorage.getItem('breakoutHighscore') || '0', 10);
let running = false, gameOver = false;
let bricks = [];

let paddle = { x: W / 2 - PADDLE_W / 2, w: PADDLE_W };
let balls = [];
let particles = [];
let popups = [];
let powerups = [];
let dying = [];
let shake = 0;
let combo = 0, comboTimer = 0;
let slowTimer = 0, paddleEffectTimer = 0;
let totalBricks = 1, destroyedBricks = 0;

const POWERUP_TYPES = [
  { type: 'wide', color: '#54a0ff', label: 'W' },
  { type: 'shrink', color: '#ff5e7a', label: 'S' },
  { type: 'slow', color: '#7ee787', label: 'Z' },
  { type: 'multi', color: '#ffd76f', label: 'M' },
  { type: 'life', color: '#ff6fa5', label: '+' }
];

// Sterne-Hintergrund (funkeln per Sinus-Phase)
const stars = Array.from({ length: 60 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.2 + 0.2,
  a: Math.random() * 0.5 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: 0.5 + Math.random() * 1.5
}));

// Warme Bokeh-Lichter (driften langsam durchs Bild)
const bokeh = Array.from({ length: 7 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 30 + Math.random() * 55,
  drift: 4 + Math.random() * 8,
  a: 0.03 + Math.random() * 0.04
}));

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      life: 1,
      color: Math.random() < 0.4 ? color : SPRINKLE_COLORS[Math.floor(Math.random() * SPRINKLE_COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.4
    });
  }
}

function updateParticles(ts) {
  for (const p of particles) {
    p.x += p.dx * ts;
    p.y += p.dy * ts;
    p.dy += 0.08 * ts;
    p.life -= 0.035 * ts;
    p.rot += p.spin * ts;
  }
  particles = particles.filter(p => p.life > 0);
}

function spawnPopup(x, y, text, color) {
  popups.push({ x, y, text, color, life: 1 });
}

function updatePopups(ts) {
  for (const p of popups) {
    p.y -= 0.6 * ts;
    p.life -= 0.018 * ts;
  }
  popups = popups.filter(p => p.life > 0);
}

// Zerstoerte Donuts trudeln davon statt schlagartig zu verschwinden
function spawnDyingDonut(b) {
  dying.push({
    x: b.x + b.w / 2, y: b.y + b.h / 2,
    rOuter: Math.min(b.w, b.h) / 2 - 1,
    glaze: b.glaze, sprinkles: b.sprinkles,
    bitten: b.bitten, biteAngle: b.biteAngle,
    rot: 0, vrot: (Math.random() - 0.5) * 0.3,
    vy: -1.5 - Math.random(), life: 1
  });
}

function updateDying(ts) {
  for (const d of dying) {
    d.rot += d.vrot * ts;
    d.y += d.vy * ts;
    d.vy += 0.15 * ts;
    d.life -= 0.05 * ts;
  }
  dying = dying.filter(d => d.life > 0);
}

function spawnPowerup(x, y) {
  const def = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({ x, y, r: 11, dy: 2.2, ...def });
}

function addExtraBall() {
  if (balls.length === 0) return;
  const base = balls[0];
  const speed = Math.max(Math.hypot(base.dx, base.dy), 3.5);
  balls.push({
    x: base.x, y: base.y,
    dx: (Math.random() - 0.5) * speed * 1.3,
    dy: -speed * (0.6 + Math.random() * 0.3),
    r: BALL_R,
    trail: []
  });
}

function applyPowerup(type) {
  sound.powerup();
  switch (type) {
    case 'wide':
      paddle.w = PADDLE_W * 1.5;
      paddleEffectTimer = 600;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
      spawnPopup(paddle.x + paddle.w / 2, PADDLE_Y - 14, 'Breiter!', '#54a0ff');
      break;
    case 'shrink':
      paddle.w = PADDLE_W * 0.65;
      paddleEffectTimer = 600;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
      spawnPopup(paddle.x + paddle.w / 2, PADDLE_Y - 14, 'Schmaler!', '#ff5e7a');
      break;
    case 'slow':
      slowTimer = 480;
      spawnPopup(paddle.x + paddle.w / 2, PADDLE_Y - 14, 'Slow-Mo!', '#7ee787');
      break;
    case 'multi':
      addExtraBall();
      addExtraBall();
      spawnPopup(paddle.x + paddle.w / 2, PADDLE_Y - 14, 'Multiball!', '#ffd76f');
      break;
    case 'life':
      lives++;
      updateHud();
      spawnPopup(paddle.x + paddle.w / 2, PADDLE_Y - 14, '+1 Leben!', '#ff6fa5');
      break;
  }
}

// --- Sound ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.2, glideTo = null) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ac.currentTime + duration);
  gain.gain.setValueAtTime(volume, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start();
  osc.stop(ac.currentTime + duration);
}

let muted = false;
const sound = {
  wall: () => !muted && playTone(220, 0.06, 'triangle', 0.12),
  paddle: () => !muted && playTone(330, 0.08, 'square', 0.15, 440),
  brick: pitch => !muted && playTone(440 + pitch * 30, 0.1, 'square', 0.18, 660 + pitch * 30),
  life: () => !muted && playTone(180, 0.35, 'sawtooth', 0.2, 80),
  levelUp: () => {
    if (muted) return;
    playTone(440, 0.12, 'sine', 0.2, 660);
    setTimeout(() => playTone(660, 0.15, 'sine', 0.2, 880), 120);
  },
  gameOver: () => !muted && playTone(300, 0.6, 'sawtooth', 0.2, 60),
  powerup: () => !muted && playTone(523, 0.12, 'sine', 0.18, 784)
};

function resetBall(speedMult = 1) {
  // Ball klebt am Paddle und wird per Tipp/Leertaste abgeschossen
  balls = [{
    x: paddle.x + paddle.w / 2,
    y: PADDLE_Y - BALL_R - 1,
    dx: 0,
    dy: 0,
    speedMult,
    stuck: true,
    r: BALL_R,
    trail: []
  }];
}

function launchStuckBalls() {
  let launched = false;
  for (const ball of balls) {
    if (!ball.stuck) continue;
    ball.stuck = false;
    ball.dx = (Math.random() * 2 - 1) * 2 * ball.speedMult;
    ball.dy = -3.5 * ball.speedMult;
    launched = true;
  }
  if (launched) sound.paddle();
  return launched;
}

function buildBricks() {
  bricks = [];
  const now = performance.now();
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const glaze = GLAZE_COLORS[r % GLAZE_COLORS.length];
      const sprinkles = Array.from({ length: 6 }, () => ({
        angle: Math.random() * Math.PI * 2,
        dist: Math.random() * (BRICK_W / 2 - 8) + 4,
        rot: Math.random() * Math.PI,
        color: SPRINKLE_COLORS[Math.floor(Math.random() * SPRINKLE_COLORS.length)]
      }));
      bricks.push({
        x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
        y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        alive: true,
        glaze,
        sprinkles,
        // Obere zwei Reihen sind zaehe Donuts: erster Treffer beisst nur an
        hp: r < 2 ? 2 : 1,
        bitten: false,
        biteAngle: Math.random() * Math.PI * 2,
        born: now + (r * BRICK_COLS + c) * 28,
        points: (BRICK_ROWS - r) * 10
      });
    }
  }
  totalBricks = bricks.length;
  destroyedBricks = 0;
}

function resetGame() {
  score = 0; lives = 3; level = 1;
  combo = 0; comboTimer = 0;
  slowTimer = 0; paddleEffectTimer = 0;
  powerups = []; popups = []; dying = [];
  paddle.w = PADDLE_W;
  paddle.x = W / 2 - paddle.w / 2;
  buildBricks();
  resetBall(1 + (level - 1) * 0.15);
  updateHud();
}

function updateHud() {
  scoreEl.textContent = score;
  highscoreEl.textContent = highscore;
  livesEl.textContent = '♥'.repeat(Math.min(Math.max(lives, 0), 8));
  levelEl.textContent = level;
}

function showOverlay(title, text, btnLabel) {
  overlayTitle.textContent = title;
  overlayText.textContent = text;
  overlayBtn.textContent = btnLabel;
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

document.getElementById('muteBtn').addEventListener('click', e => {
  e.stopPropagation();
  muted = !muted;
  e.target.textContent = muted ? '🔇' : '🔊';
});

// Steuerung
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mouseX = (e.clientX - rect.left) * (W / rect.width);
  paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
});

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    toggleRun();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', toggleRun);
overlayBtn.addEventListener('click', toggleRun);

// Touch-Steuerung (Mobil): relatives Wischen statt absoluter Fingerposition,
// damit der Finger das Paddle nicht verdeckt. Auf der gesamten Seite aktiv
// (auch unterhalb des Spielfelds), nicht nur auf dem Canvas.
let lastTouchX = null;

canvas.addEventListener('touchstart', e => {
  if (!running) toggleRun();
  else launchStuckBalls();
}, { passive: true });

document.addEventListener('touchstart', e => {
  lastTouchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (e.target === document.getElementById('muteBtn')) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touchX = e.touches[0].clientX;
  if (lastTouchX !== null) {
    const deltaX = (touchX - lastTouchX) * (W / rect.width);
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x + deltaX));
  }
  lastTouchX = touchX;
}, { passive: false });

document.addEventListener('touchend', () => { lastTouchX = null; });

overlayBtn.addEventListener('touchstart', e => {
  e.preventDefault();
  toggleRun();
}, { passive: false });

function toggleRun() {
  if (gameOver) {
    resetGame();
    gameOver = false;
    running = true;
    hideOverlay();
    return;
  }
  // Laeuft das Spiel und ein Ball klebt am Paddle: Tipp schiesst ab statt zu pausieren
  if (running && launchStuckBalls()) return;
  running = !running;
  if (running) hideOverlay();
  else showOverlay('Pause', 'Leertaste oder Klick zum Weiterspielen', 'Weiter');
}

function movePaddle(ts) {
  if (keys['ArrowLeft']) paddle.x -= 7 * ts;
  if (keys['ArrowRight']) paddle.x += 7 * ts;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
}

function update(ts) {
  movePaddle(ts);
  updateParticles(ts);
  updatePopups(ts);
  updateDying(ts);
  if (shake > 0) shake *= Math.pow(0.85, ts);

  if (slowTimer > 0) slowTimer -= ts;
  if (paddleEffectTimer > 0) {
    paddleEffectTimer -= ts;
    if (paddleEffectTimer <= 0) {
      paddle.w = PADDLE_W;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    }
  }
  // Klassische Rampe: je weniger Donuts uebrig, desto schneller der Ball
  const speedRamp = 1 + (destroyedBricks / totalBricks) * 0.35;
  const speedFactor = (slowTimer > 0 ? 0.6 : 1) * speedRamp;

  for (let bi = balls.length - 1; bi >= 0; bi--) {
    const ball = balls[bi];

    // Festklebender Ball reitet auf dem Paddle, bis er abgeschossen wird
    if (ball.stuck) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = PADDLE_Y - ball.r - 1;
      ball.trail.length = 0;
      continue;
    }

    ball.x += ball.dx * speedFactor * ts;
    ball.y += ball.dy * speedFactor * ts;

    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 10) ball.trail.shift();

    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; sound.wall(); }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx *= -1; sound.wall(); }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; sound.wall(); }

    // Paddle-Kollision
    if (ball.y + ball.r >= PADDLE_Y && ball.y + ball.r <= PADDLE_Y + PADDLE_H + 6 &&
        ball.x >= paddle.x && ball.x <= paddle.x + paddle.w && ball.dy > 0) {
      const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      ball.dy = -Math.abs(ball.dy);
      ball.dx = hitPos * 5;
      ball.y = PADDLE_Y - ball.r;
      sound.paddle();
    }

    // Bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {

        combo++;
        comboTimer = 90;
        const multiplier = 1 + Math.min(Math.floor((combo - 1) / 2) * 0.5, 2);

        b.hp--;
        if (b.hp > 0) {
          // Zaeher Donut: erster Treffer beisst nur an
          b.bitten = true;
          const gained = Math.round(10 * multiplier);
          score += gained;
          spawnParticles(ball.x, ball.y, b.glaze, 6);
          spawnPopup(b.x + b.w / 2, b.y + b.h / 2, `+${gained}`, '#f3c98a');
          sound.wall();
        } else {
          b.alive = false;
          destroyedBricks++;
          spawnDyingDonut(b);
          const gained = Math.round(b.points * multiplier);
          score += gained;
          spawnParticles(ball.x, ball.y, b.glaze, 12);
          spawnPopup(b.x + b.w / 2, b.y + b.h / 2, multiplier > 1 ? `+${gained} x${multiplier}` : `+${gained}`, multiplier > 1 ? '#ffd76f' : '#ffffff');
          sound.brick(b.points / 10);
          if (Math.random() < 0.18) spawnPowerup(b.x + b.w / 2, b.y + b.h / 2);
        }

        const overlapLeft = (ball.x + ball.r) - b.x;
        const overlapRight = (b.x + b.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - b.y;
        const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        if (minOverlap === overlapTop || minOverlap === overlapBottom) ball.dy *= -1;
        else ball.dx *= -1;

        updateHud();
        break;
      }
    }

    // Anti-Stuck: nie fast-horizontal (endloses Hin und Her) oder exakt vertikal
    if (Math.abs(ball.dy) < 1.2) ball.dy = (ball.dy < 0 ? -1.2 : 1.2);
    if (Math.abs(ball.dx) < 0.25) ball.dx += (Math.random() < 0.5 ? -0.4 : 0.4);

    if (ball.y - ball.r > H) {
      balls.splice(bi, 1);
    }
  }

  if (comboTimer > 0) {
    comboTimer -= ts;
    if (comboTimer <= 0) { comboTimer = 0; combo = 0; }
  }

  // Power-ups einsammeln
  for (let pi = powerups.length - 1; pi >= 0; pi--) {
    const p = powerups[pi];
    p.y += p.dy * ts;
    if (p.y + p.r >= PADDLE_Y && p.y - p.r <= PADDLE_Y + PADDLE_H &&
        p.x >= paddle.x - p.r && p.x <= paddle.x + paddle.w + p.r) {
      applyPowerup(p.type);
      powerups.splice(pi, 1);
    } else if (p.y - p.r > H) {
      powerups.splice(pi, 1);
    }
  }

  // Alle Baelle verloren
  if (balls.length === 0) {
    lives--;
    shake = 12;
    updateHud();
    if (lives <= 0) {
      gameOver = true;
      running = false;
      sound.gameOver();
      const isNewRecord = score > highscore;
      if (isNewRecord) {
        highscore = score;
        localStorage.setItem('breakoutHighscore', highscore);
        updateHud();
      }
      showOverlay('Game Over', isNewRecord ? `Neuer Highscore: ${score}! 🎉` : `Score: ${score} · Highscore: ${highscore}`, 'Neu starten');
    } else {
      sound.life();
      combo = 0; comboTimer = 0;
      resetBall(1 + (level - 1) * 0.15);
    }
  }

  // Level geschafft
  if (bricks.every(b => !b.alive)) {
    level++;
    buildBricks();
    resetBall(1 + (level - 1) * 0.15);
    powerups = [];
    paddle.w = PADDLE_W; paddleEffectTimer = 0; slowTimer = 0;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    updateHud();
    sound.levelUp();
  }
}

function shadeColor(hex, percent) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + percent, g = ((num >> 8) & 0x00FF) + percent, b = (num & 0x0000FF) + percent;
  r = Math.max(Math.min(255, r), 0); g = Math.max(Math.min(255, g), 0); b = Math.max(Math.min(255, b), 0);
  return `rgb(${r},${g},${b})`;
}

// Zeichnet einen Donut an (cx, cy); opts: scale, rot, alpha, bitten, biteAngle
function drawDonut(cx, cy, rOuter, glaze, sprinkles, opts = {}) {
  const { scale = 1, rot = 0, alpha = 1, bitten = false, biteAngle = 0 } = opts;
  const rInner = rOuter * 0.4;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;

  // Schlagschatten auf der Unterlage
  ctx.beginPath();
  ctx.arc(1.5, 2.5, rOuter, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();

  // Teig-Ring (3D-Gradient: hell oben, dunkel unten)
  ctx.beginPath();
  ctx.arc(0, 0, rOuter, 0, Math.PI * 2);
  const doughGrad = ctx.createLinearGradient(0, -rOuter, 0, rOuter);
  doughGrad.addColorStop(0, '#f3c98a');
  doughGrad.addColorStop(0.5, '#d89b56');
  doughGrad.addColorStop(1, '#a8703a');
  ctx.fillStyle = doughGrad;
  ctx.fill();

  // Glasur (etwas kleiner als Teig, oben drauf)
  ctx.beginPath();
  ctx.arc(0, -0.5, rOuter * 0.92, 0, Math.PI * 2);
  const glazeGrad = ctx.createRadialGradient(-rOuter * 0.3, -rOuter * 0.4, 1, 0, 0, rOuter);
  glazeGrad.addColorStop(0, shadeColor(glaze, 60));
  glazeGrad.addColorStop(0.6, glaze);
  glazeGrad.addColorStop(1, shadeColor(glaze, -30));
  ctx.fillStyle = glazeGrad;
  ctx.fill();

  // Glanzlicht
  ctx.beginPath();
  ctx.ellipse(-rOuter * 0.35, -rOuter * 0.45, rOuter * 0.32, rOuter * 0.14, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  // Loch in der Mitte
  ctx.beginPath();
  ctx.arc(0, 0, rInner, 0, Math.PI * 2);
  ctx.fillStyle = '#120c16';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0.8, rInner * 0.85, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Streusel
  for (const s of sprinkles) {
    const sx = Math.cos(s.angle) * s.dist;
    const sy = Math.sin(s.angle) * s.dist;
    if (Math.hypot(sx, sy) > rOuter * 0.92 || Math.hypot(sx, sy) < rInner * 1.15) continue;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(s.rot);
    ctx.fillStyle = s.color;
    ctx.fillRect(-2.5, -0.8, 5, 1.6);
    ctx.restore();
  }

  // Angebissen: Bissmulde mit zwei Zahnabdruecken am Rand
  if (bitten) {
    const bx = Math.cos(biteAngle) * rOuter * 0.95;
    const by = Math.sin(biteAngle) * rOuter * 0.95;
    ctx.fillStyle = '#120c16';
    ctx.beginPath();
    ctx.arc(bx, by, rOuter * 0.45, 0, Math.PI * 2);
    ctx.fill();
    for (const off of [-0.45, 0.45]) {
      const tx = Math.cos(biteAngle + off) * rOuter * 0.8;
      const ty = Math.sin(biteAngle + off) * rOuter * 0.8;
      ctx.beginPath();
      ctx.arc(tx, ty, rOuter * 0.13, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function draw() {
  const now = performance.now();
  ctx.save();
  if (shake > 0.3) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  ctx.clearRect(-20, -20, W + 40, H + 40);

  // Warme Bokeh-Lichter (langsam driftend)
  for (const b of bokeh) {
    const bx = ((b.x + now / 1000 * b.drift) % (W + b.r * 2)) - b.r;
    const g = ctx.createRadialGradient(bx, b.y, 1, bx, b.y, b.r);
    g.addColorStop(0, `rgba(255,170,100,${b.a})`);
    g.addColorStop(1, 'rgba(255,170,100,0)');
    ctx.fillStyle = g;
    ctx.fillRect(bx - b.r, b.y - b.r, b.r * 2, b.r * 2);
  }

  // Sterne (funkelnd)
  for (const s of stars) {
    const tw = 0.6 + 0.4 * Math.sin(now / 1000 * s.speed + s.phase);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,225,190,${s.a * tw})`;
    ctx.fill();
  }

  // Sterbende Donuts (trudeln davon)
  for (const d of dying) {
    drawDonut(d.x, d.y, d.rOuter, d.glaze, d.sprinkles, {
      scale: Math.max(d.life, 0.01), rot: d.rot, alpha: Math.max(d.life, 0),
      bitten: d.bitten, biteAngle: d.biteAngle
    });
  }

  // Bricks als 3D-Donuts (mit Einflug-Animation beim Levelstart)
  for (const b of bricks) {
    if (!b.alive) continue;
    const prog = Math.min(Math.max((now - b.born) / 260, 0), 1);
    if (prog <= 0) continue;
    const ease = 1 - Math.pow(1 - prog, 3);
    drawDonut(b.x + b.w / 2, b.y + b.h / 2, Math.min(b.w, b.h) / 2 - 1, b.glaze, b.sprinkles, {
      scale: ease, alpha: ease, bitten: b.bitten, biteAngle: b.biteAngle
    });
  }

  // Partikel (Streusel-Splitter)
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-2.5, -0.8, 5, 1.6);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Paddle als Nudelholz (Rolling Pin)
  const handleW = 10, handleH = PADDLE_H * 0.6;
  const bodyX = paddle.x + handleW, bodyW = paddle.w - handleW * 2;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;

  // Holz-Walze (Zylinder-Look: helle Mitte, dunkle Raender oben/unten)
  const woodGrad = ctx.createLinearGradient(0, PADDLE_Y, 0, PADDLE_Y + PADDLE_H);
  woodGrad.addColorStop(0, '#8a5a2e');
  woodGrad.addColorStop(0.5, '#e8b576');
  woodGrad.addColorStop(1, '#8a5a2e');
  ctx.fillStyle = woodGrad;
  ctx.beginPath();
  ctx.roundRect(bodyX, PADDLE_Y, bodyW, PADDLE_H, PADDLE_H / 2);
  ctx.fill();
  ctx.restore();

  // Holzmaserung
  ctx.strokeStyle = 'rgba(120,70,30,0.35)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(bodyX + 6, PADDLE_Y + (PADDLE_H / 4) * i);
    ctx.lineTo(bodyX + bodyW - 6, PADDLE_Y + (PADDLE_H / 4) * i);
    ctx.stroke();
  }

  // Glanzstreifen (Zylinder-Highlight)
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.roundRect(bodyX + 4, PADDLE_Y + 2, bodyW - 8, 2.5, 2);
  ctx.fill();

  // Griffe an beiden Enden (helles Holz, abgesetzt)
  const handleGrad = ctx.createLinearGradient(0, PADDLE_Y + (PADDLE_H - handleH) / 2, 0, PADDLE_Y + (PADDLE_H + handleH) / 2);
  handleGrad.addColorStop(0, '#f3d9ad');
  handleGrad.addColorStop(0.5, '#caa06a');
  handleGrad.addColorStop(1, '#f3d9ad');
  ctx.fillStyle = handleGrad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, PADDLE_Y + (PADDLE_H - handleH) / 2, handleW + 2, handleH, handleH / 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(paddle.x + paddle.w - handleW - 2, PADDLE_Y + (PADDLE_H - handleH) / 2, handleW + 2, handleH, handleH / 2);
  ctx.fill();

  // Baelle mit Trail und Glow (warmes Zucker-Licht)
  for (const ball of balls) {
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const alpha = (i / ball.trail.length) * 0.4;
      const r = ball.r * (i / ball.trail.length);
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,205,150,${alpha})`;
      ctx.fill();
    }

    ctx.save();
    ctx.shadowColor = 'rgba(255,225,180,0.9)';
    ctx.shadowBlur = 16;
    const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(1, '#ffd9a0');
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = ballGrad;
    ctx.fill();
    ctx.restore();
  }

  // Abschuss-Hinweis, solange ein Ball am Paddle klebt
  if (running && balls.some(b => b.stuck)) {
    const pulse = 0.5 + 0.5 * Math.sin(now / 300);
    ctx.save();
    ctx.globalAlpha = 0.45 + pulse * 0.45;
    ctx.font = "bold 14px 'Quicksand', sans-serif";
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd9a0';
    ctx.shadowColor = 'rgba(255,180,100,0.8)';
    ctx.shadowBlur = 10;
    ctx.fillText('Tippen / Leertaste zum Abschuss', W / 2, PADDLE_Y - 34);
    ctx.restore();
  }

  // Power-ups
  for (const p of powerups) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.beginPath();
    ctx.arc(0, 0, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0c1018';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.label, 0, 1);
    ctx.restore();
  }

  // Popups (Punkte/Power-up-Texte)
  for (const p of popups) {
    ctx.save();
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Combo-Anzeige
  if (combo > 1) {
    ctx.save();
    ctx.globalAlpha = Math.min(comboTimer / 30, 1);
    ctx.font = "bold 16px 'Quicksand', sans-serif";
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd76f';
    ctx.shadowColor = 'rgba(255,215,110,0.8)';
    ctx.shadowBlur = 10;
    ctx.fillText(`Combo x${combo}`, W - 14, 28);
    ctx.restore();
  }

  ctx.restore();
}

// Delta-Time-Loop: Spielgeschwindigkeit unabhaengig von der Bildwiederholrate
// (sonst laeuft das Spiel auf 120Hz-Displays doppelt so schnell)
let lastFrameTime = performance.now();
function loop(now) {
  now = now || performance.now();
  let ts = (now - lastFrameTime) / (1000 / 60);
  lastFrameTime = now;
  ts = Math.min(Math.max(ts, 0.25), 3);
  if (running) {
    update(ts);
  }
  draw();
  requestAnimationFrame(loop);
}

resetGame();
showOverlay('Donut Breakout', 'Zerschlage alle Donuts – oben sitzen die zähen, die zwei Treffer brauchen. Sammle Power-ups mit dem Nudelholz!', 'Start');
loop();
</script>
